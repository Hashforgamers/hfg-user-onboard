version: "3.8"
services:
  booking_service:
    build: .
    ports:
      - "5053:5053"
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - DATABASE_URI=postgresql://neondb_owner:Od9UnVJ2Wvfr@ep-square-star-a8fg370g-pooler.eastus2.azure.neon.tech/neondb?sslmode=require&channel_binding=require
      - DEBUG_MODE=true
      - MAIL_SERVER=mail.smtp2go.com
